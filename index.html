<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Washer Catalog V2.5 Smart</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <img src="assets/logo.svg" alt="iCOOL" class="login-logo" />
      <h2>iCOOL Access</h2>
      <p class="dim center">Washer Catalog V2.5 Smart</p>
      <input id="loginUser" type="text" placeholder="Username" autocomplete="username" />
      <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn">Login</button>
      <div id="loginMsg" class="error-text"></div>
    </div>
  </div>

  <div class="app-shell">
    <header class="hero-card">
      <div class="hero-top">
        <div class="hero-brand">
          <img src="assets/logo.svg" alt="iCOOL" class="hero-logo" />
          <div class="hero-text">
            <h1>Washer Catalog V2.5 Smart</h1>
            <p>Faults · Boards · Parts · Documents · AI Update · De-duplication · Cloud Sync</p>
          </div>
        </div>

        <div class="top-actions">
          <button id="homeBtn" class="ghost-btn">Home</button>
          <button id="smartAdminBtn" class="ghost-btn">Smart Admin</button>
          <button id="logoutBtn" class="ghost-btn">Logout</button>
        </div>
      </div>
    </header>

    <section class="panel-card">
      <div class="search-wrap">
        <input
          id="globalSearch"
          type="text"
          placeholder="ابحث عن الموديل أو كود العطل أو البورد أو القطعة"
        />
        <button id="searchBtn">Search</button>
      </div>

      <div class="status-row">
        <div id="statsBox" class="status-pill">Loading data...</div>
        <button id="reloadBtn" class="mini-btn" type="button">Reload Data</button>
      </div>
    </section>

    <section class="panel-card">
      <h2 class="section-title">Brands</h2>
      <div id="brandList" class="brand-list"></div>
    </section>

    <section id="adminPanel" class="panel-card hidden">
      <h2 class="section-title">Smart Admin</h2>

      <div class="admin-grid">
        <div class="field-block">
          <label for="brandSelect">Brand</label>
          <select id="brandSelect"></select>
        </div>

        <div class="field-block wide">
          <label for="aiInstruction">AI Instruction</label>
          <textarea
            id="aiInstruction"
            rows="7"
            placeholder="Expand samsung with older and newer models, fuller error families, cleaner aliases, board mapping notes, and more complete parts while preserving the same JSON structure and avoiding duplicates."
          ></textarea>
        </div>
      </div>

      <div class="admin-actions">
        <button id="normalizeBtn">Normalize &amp; De-duplicate</button>
        <button id="saveOverrideBtn">Save Override</button>
        <button id="resetBrandBtn" class="ghost-btn">Reset Brand</button>
        <button id="exportBrandBtn" class="ghost-btn">Export Brand</button>
        <button id="exportAllBtn" class="ghost-btn">Export All</button>
        <button id="cloudLoadBtn" class="ghost-btn">Cloud Load</button>
        <button id="cloudSaveBtn" class="ghost-btn">Cloud Save</button>
        <button id="importJsonBtn" class="ghost-btn">Import JSON</button>
        <button id="applyAiBtn">Apply AI Update</button>
        <button id="updateAllBtn" class="ghost-btn">Update All Brands</button>
      </div>

      <input id="importJsonFile" type="file" accept=".json,application/json" hidden />

      <div id="aiStatus" class="admin-status">
        Tip: ask for older + newer models, better board mapping notes, full fault families, and cleaner aliases.
      </div>

      <div class="field-block wide">
        <label for="brandJson">Brand JSON</label>
        <textarea id="brandJson" rows="20" spellcheck="false"></textarea>
      </div>
    </section>

    <section class="panel-card">
      <div id="crumbs" class="crumbs">Home</div>
      <div id="viewRoot"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
