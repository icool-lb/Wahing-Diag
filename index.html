<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iCOOL Washer Smart Suite</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand-main"><img src="assets/logo/icool.svg" class="icool-logo" alt="iCOOL"><div><h1>Washer Smart Suite</h1><p>Clean technician view for search, brands, models, faults, parts, manuals, and wiring.</p></div></div>
      <div class="row"><button id="homeBtn" class="ghost-btn">Home</button><button id="adminBtn" class="ghost-btn">Admin / AI</button></div>
    </header>
    <section class="search-panel"><div class="search-row"><input id="globalSearch" type="text" placeholder="Search model, error code, board, part, or manual"><button id="searchBtn">Search</button></div><div class="subrow"><div id="statsBox" class="pill">Loading...</div><div id="crumbs" class="crumbs">Home</div></div></section>
    <main class="layout"><aside class="sidebar"><h2>Brands</h2><div id="brandList" class="brand-list"></div></aside><section class="mainview"><div id="viewRoot"></div></section></main>
  </div>
  <script src="app.js"></script>
</body>
</html>
